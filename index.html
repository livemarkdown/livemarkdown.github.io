                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12h8" />
                        <path d="M4 18V6" />
                        <path d="M12 18V6" />
                        <path d="M21 18h-4c0-4 4-3 4-6 0-1.5-2-2.5-4-1" />
                    </svg></button>
                <button class="tb-btn" data-tip="Heading 3" onclick="insertHeading(3)">
                    <!-- Heading 3 Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12h8" />
                        <path d="M4 18V6" />
                        <path d="M12 18V6" />
                        <path d="M17.5 10.5c1.7-1 3.5 0 3.5 1.5a2 2 0 0 1-2 2" />
                        <path d="M17 17.5c2 1.5 4 .3 4-1.5a2 2 0 0 0-2-2" />
                    </svg></button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-tip="Unordered list" onclick="insertLine('- ')">
                    <!-- Unordered List Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 5h.01" />
                        <path d="M3 12h.01" />
                        <path d="M3 19h.01" />
                        <path d="M8 5h13" />
                        <path d="M8 12h13" />
                        <path d="M8 19h13" />
                    </svg></button>
                <button class="tb-btn" data-tip="Ordered list" onclick="insertLine('1. ')">
                    <!-- Ordered List Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 5h10" />
                        <path d="M11 12h10" />
                        <path d="M11 19h10" />
                        <path d="M4 4h1v5" />
                        <path d="M4 9h2" />
                        <path d="M6.5 20H3.4c0-1 2.6-1.925 2.6-3.5a1.5 1.5 0 0 0-2.6-1.02" />
                    </svg></button>
                <button class="tb-btn" data-tip="Task list" onclick="insertLine('- [ ] ')">
                    <!-- Task List Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 5h8" />
                        <path d="M13 12h8" />
                        <path d="M13 19h8" />
                        <path d="m3 17 2 2 4-4" />
                        <rect x="3" y="4" width="6" height="6" rx="1" />
                    </svg></button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-tip="Link" onclick="insertLink()">
                    <!-- Link Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                    </svg></button>
                <button class="tb-btn" data-tip="Image" onclick="insertImage()">
                    <!-- Image Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                        <circle cx="9" cy="9" r="2" />
                        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                    </svg></button>
                <button class="tb-btn" data-tip="Blockquote" onclick="insertLine('> ')">
                    <!-- Quote Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M16 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z" />
                        <path
                            d="M5 3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2 1 1 0 0 1 1 1v1a2 2 0 0 1-2 2 1 1 0 0 0-1 1v2a1 1 0 0 0 1 1 6 6 0 0 0 6-6V5a2 2 0 0 0-2-2z" />
                    </svg></button>
                <button class="tb-btn" data-tip="Table" onclick="insertTable()">
                    <!-- Table Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3v18" />
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M21 9H3" />
                        <path d="M21 15H3" />
                    </svg></button>
                <button class="tb-btn" data-tip="Horizontal rule" onclick="insertLine('\n---\n')">
                    <!-- Minus/Rule Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                    </svg></button>
                <div class="tb-sep"></div>
                <button class="tb-btn" data-tip="LaTeX math" onclick="insertMath()">
                    <!-- Sigma/Math Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M18 7V5a1 1 0 0 0-1-1H6.5a.5.5 0 0 0-.4.8l4.5 6a2 2 0 0 1 0 2.4l-4.5 6a.5.5 0 0 0 .4.8H17a1 1 0 0 0 1-1v-2" />
                    </svg></button>
                <button class="tb-btn" data-tip="Mermaid diagram" onclick="insertMermaid()">
                    <!-- Vector/Diagram Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19.5 7a24 24 0 0 1 0 10" />
                        <path d="M4.5 7a24 24 0 0 0 0 10" />
                        <path d="M7 19.5a24 24 0 0 0 10 0" />
                        <path d="M7 4.5a24 24 0 0 1 10 0" />
                        <rect x="17" y="17" width="5" height="5" rx="1" />
                        <rect x="17" y="2" width="5" height="5" rx="1" />
                        <rect x="2" y="17" width="5" height="5" rx="1" />
                        <rect x="2" y="2" width="5" height="5" rx="1" />
                    </svg></button>
                <div class="tb-spacer"></div>
                <button class="tb-btn" id="shortcuts-btn" data-tip="Keyboard shortcuts (?)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="6" width="20" height="12" rx="2" />
                        <path d="M6 10h.01" />
                        <path d="M10 10h.01" />
                        <path d="M14 10h.01" />
                        <path d="M18 10h.01" />
                        <path d="M8 14h8" />
                    </svg>
                </button>
                <button class="tb-btn" data-tip="Find (Ctrl+F)" id="find-btn"><svg viewBox="0 0 14 14" fill="none"
                        stroke="currentColor" stroke-width="1.5">
                        <circle cx="6" cy="6" r="4" />
                        <path d="M9 9l3 3" />
                    </svg></button>
                <div id="find-bar">
                    <div class="find-row">
                        <input type="text" id="find-input" placeholder="Find…" />
                        <span class="find-count" id="find-count">0/0</span>
                        <div class="find-actions">
                            <button class="tb-btn" id="find-prev" title="Previous">
                                <!-- Chevron Up Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="m18 15-6-6-6 6" />
                                </svg>
                            </button>
                            <button class="tb-btn" id="find-next" title="Next">
                                <!-- Chevron Down Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="m6 9 6 6 6-6" />
                                </svg>
                            </button>
                            <button class="tb-btn" id="find-close" title="Close">
                                <!-- X Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M18 6 6 18" />
                                    <path d="m6 6 12 12" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="replace-row" id="replace-row">
                        <input type="text" id="replace-input" placeholder="Replace with…" />
                        <div class="replace-actions">
                            <button class="btn btn-sm" id="btn-replace">Replace</button>
                            <button class="btn btn-sm" id="btn-replace-all">Replace All</button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Editor and Preview Panes -->
            <div id="editor-wrap">
                <div id="line-numbers"></div>
                <div id="editor-highlights" aria-hidden="true"></div>
                <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off"
                    autocapitalize="off"></textarea>
                <div id="drop-overlay">
                    <div class="drop-overlay-inner">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="17 8 12 3 7 8" />
                            <line x1="12" y1="3" x2="12" y2="15" />
                        </svg>
                        <span>Drop .md or .txt file</span>
                    </div>
                </div>
            </div>

            <!-- Status Bar -->
            <div id="status-bar">
                <div class="status-item">
                    <span class="status-label">Ln</span>
                    <span class="status-val" id="wc-ln">1</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Col</span>
                    <span class="status-val" id="wc-col">1</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Words</span>
                    <span class="status-val" id="wc-words">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Chars</span>
                    <span class="status-val" id="wc-chars">0</span>
                </div>
                <div class="status-item status-reading">
                    <span class="status-val" id="wc-reading">~0 min read</span>
                </div>
                <div class="status-spacer"></div>
                <button id="spellcheck-btn" class="status-btn" title="Toggle spell check">Spell: OFF</button>
            </div>
        </div>

        <!-- Divider -->
        <div id="divider"></div>

        <!-- Preview Pane -->
        <div class="pane" id="preview-pane">
            <div class="pane-header">
                <div class="pane-header-label">
                    <div class="pane-dot" style="background:var(--accent2)"></div>
                    PREVIEW
                </div>
                <div class="preview-font-controls">
                    <select id="preview-font-select" title="Preview font family">
                        <option value="serif">Serif</option>
                        <option value="sans">Sans</option>
                        <option value="mono">Mono</option>
                    </select>
                    <input type="range" id="preview-font-size" min="13" max="22" value="17" title="Font size" />
                    <span id="preview-font-size-label" class="status-val">17px</span>
                </div>
                <div class="pane-actions">
                    <button class="pane-btn" id="btn-fullscreen-preview" title="Fullscreen preview">
                        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="preview-scroll">
                <div id="preview-content">
                    <div id="preview" class="markdown-body"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── Modal ────────────────────────────────────────────────── -->
    <div id="modal-overlay">
        <div id="modal">
            <div class="modal-title" id="modal-title">Confirm</div>
            <div class="modal-body" id="modal-body">Are you sure?</div>
            <div class="modal-actions" id="modal-actions"></div>
        </div>
    </div>

    <!-- ─── Toast ────────────────────────────────────────────────── -->
    <div id="toast"></div>

    <!-- Scripts -->
    <script src="./sample.js"></script>
    <script src="./script.js"></script>

</body>

</html>
